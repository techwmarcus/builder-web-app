name: infra deploy 

on:
  push:
    branches:
      - master
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::291433605780:user/prog-user
          aws-region: us-west-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7 

      - name: Terraform Init
        run: terraform init
        working-directory: ./TF

      - name: Terraform environment name
        run: terraform workspace select ${{ github.ref_name }} || terraform workspace new ${{ github.ref_name }}
        working-directory: ./TF

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./TF

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./TF

      - name: Terraform Destroy
        if: github.ref == 'refs/heads/dev'
        run: terraform destroy -auto-approve
        working-directory: ./TF

  terraform-destroy:
    needs: deploy
    if: failure()  # This means run this job only if the previous job failed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::291433605780:user/prog-user
          aws-region: us-west-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Init
        run: terraform init
        working-directory: ./TF

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ./TF